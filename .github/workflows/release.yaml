name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3). Required when dispatched from a branch.'
        required: false
        type: string

jobs:
  binary:
    name: Release Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v3
        with:
          go-version-file: go.mod

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v4
        with:
          args: 'release --clean'
          version: latest
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          HOMEBREW_TAP_SSH_KEY: '${{ secrets.HOMEBREW_TAP_SSH_KEY }}'
          GORELEASER_CURRENT_TAG: ${{ github.event.inputs.tag }}

  action:
    name: Release Action
    runs-on: ubuntu-latest
    needs: binary
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            action.yml
            version.txt

  helm:
    name: Deploy Helm Charts to GitHub Pages
    runs-on: ubuntu-latest
    needs: binary
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Package Helm Chart
        run: |
          mkdir -p packaged
          helm package helm --destination packaged
          cd packaged
          helm repo index . --url https://escape-technologies.github.io/cli/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packaged
          publish_branch: gh-pages
