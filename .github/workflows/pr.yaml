name: Tests
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  GO_VERSION: "1.23.0"

jobs:
  go-fmt:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    outputs:
      reformatted: ${{ steps.auto-commit.outputs.changes_detected || 'false' }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Format Go code
        run: go fmt ./...

      - name: Fail on formatting changes from external PRs
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          git diff --exit-code || {
            echo "Go formatting changes were required. Please run 'go fmt ./...' locally and push the result."
            exit 1
          }

      - name: Commit and push changes
        id: auto-commit
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: auto-format go code"

      - name: Trigger checks on formatted head
        if: ${{ github.event_name != 'workflow_dispatch' && steps.auto-commit.outputs.changes_detected == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "pr.yaml",
              ref: "${{ github.head_ref || github.ref_name }}",
            })

  go-mod:
    needs: go-fmt
    if: ${{ needs.go-fmt.outputs.reformatted != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Check go mod
        run: |
          go mod tidy
          git diff --exit-code go.mod
          git diff --exit-code go.sum

  golangci-lint:
    needs: go-fmt
    if: ${{ needs.go-fmt.outputs.reformatted != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: lint
        uses: golangci/golangci-lint-action@v7.0.0
        with:
          version: latest

  tests:
    needs: go-fmt
    if: ${{ needs.go-fmt.outputs.reformatted != 'true' }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
        golang:
          - "1.23"
          - "1.24"
          - "1.25"
          - "1.25.8"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.golang }}
      - name: Run tests
        run: go test ./...
