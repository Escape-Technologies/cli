name: Tests
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  GO_VERSION: "1.23.0"

jobs:
  go-fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      reformatted: ${{ steps.auto-commit.outputs.changes_detected || 'false' }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Format Go code
        run: go fmt ./...

      - name: Fail on formatting changes from external PRs
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          git diff --exit-code || {
            echo "Go formatting changes were required. Please run 'go fmt ./...' locally and push the result."
            exit 1
          }

      - name: Commit and push changes
        id: auto-commit
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: auto-format go code"

  go-mod:
    needs: go-fmt
    if: ${{ needs.go-fmt.outputs.reformatted != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Check go mod
        run: |
          go mod tidy
          git diff --exit-code go.mod
          git diff --exit-code go.sum

  golangci-lint:
    needs: go-fmt
    if: ${{ needs.go-fmt.outputs.reformatted != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: lint
        uses: golangci/golangci-lint-action@v7.0.0
        with:
          version: latest

  tests:
    needs: go-fmt
    if: ${{ needs.go-fmt.outputs.reformatted != 'true' }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
        golang:
          - "1.23"
          - "1.24"
          - "1.25"
          - "1.25.8"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.golang }}
      - name: Run tests
        run: go test ./...

  e2e:
    needs: [go-fmt, tests]
    if: ${{ needs.go-fmt.outputs.reformatted != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run E2E tests
        env:
          E2E_API_KEY: ${{ secrets.E2E_API_KEY }}
        run: go test -tags e2e -timeout 10m -v ./e2e/...

  # Action tests (actions.yml)
  validate-action-definition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify action.yml structure
        run: |
          python3 -c "
          import yaml
          with open('action.yml') as f:
              data = yaml.safe_load(f)
          for key in ['name', 'description', 'inputs', 'runs']:
              assert key in data, f'Missing required key: {key}'
          inputs = data['inputs']
          for name in ['profile_id', 'api_key']:
              assert name in inputs, f'Missing required input: {name}'
              assert inputs[name].get('required') is True, f'Input {name} should be required'
          assert inputs['watch']['default'] == 'false'
          assert inputs['watch']['required'] is False
          assert inputs['configuration_override']['required'] is False
          assert inputs['schema']['required'] is False
          print('action.yml is valid')
          "

  test-missing-profile-id:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run action without profile_id
        id: run
        continue-on-error: true
        uses: ./
        with:
          api_key: "fake-key-for-testing"

      - name: Assert failure
        if: steps.run.outcome == 'success'
        run: |
          echo "Expected action to fail when profile_id is missing"
          exit 1

  test-missing-api-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run action without api_key
        id: run
        continue-on-error: true
        uses: ./
        with:
          profile_id: "fake-profile-id"

      - name: Assert failure
        if: steps.run.outcome == 'success'
        run: |
          echo "Expected action to fail when api_key is missing"
          exit 1

  test-scan:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets availability
        id: secrets
        run: |
          if [ -n "${{ secrets.ESCAPE_API_KEY }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Escape DAST scan
        if: steps.secrets.outputs.available == 'true'
        uses: ./
        with:
          profile_id: ${{ secrets.ESCAPE_PROFILE_ID }}
          api_key: ${{ secrets.ESCAPE_API_KEY }}
