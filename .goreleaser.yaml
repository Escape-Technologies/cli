---
version: 2

before:
  hooks:
    - go mod tidy

checksum:
  algorithm: sha256

builds:
  - id: unix
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    binary: 'escape-cli'
    main: ./cmd/
    ldflags:
      - -s -w -X github.com/Escape-Technologies/cli/pkg/version.Version={{.Version}} -X github.com/Escape-Technologies/cli/pkg/version.Commit={{.ShortCommit}} -X github.com/Escape-Technologies/cli/pkg/version.BuildDate={{.CommitDate}}
  - id: docker
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    binary: 'escape-cli'
    main: ./cmd/
    ldflags:
      - -s -w -X github.com/Escape-Technologies/cli/pkg/version.Version={{.Version}} -X github.com/Escape-Technologies/cli/pkg/version.Commit={{.ShortCommit}} -X github.com/Escape-Technologies/cli/pkg/version.BuildDate={{.CommitDate}} -X github.com/Escape-Technologies/cli/pkg/version.InstallMethodOverride=docker
  - id: windows
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    binary: 'escape-cli'
    main: ./cmd/
    ldflags:
      - -s -w -X github.com/Escape-Technologies/cli/pkg/version.Version={{.Version}} -X github.com/Escape-Technologies/cli/pkg/version.Commit={{.ShortCommit}} -X github.com/Escape-Technologies/cli/pkg/version.BuildDate={{.CommitDate}}

archives:
  - id: unix
    ids: [unix]
  - id: windows
    ids: [windows]
    format_overrides:
      - goos: windows
        formats: [zip]

homebrew_casks:
  - name: escape-cli
    ids: [unix]
    binaries: [escape-cli]
    repository:
      owner: Escape-Technologies
      name: homebrew-tap
      git:
        url: git@github.com:Escape-Technologies/homebrew-tap.git
        private_key: '{{ .Env.HOMEBREW_TAP_SSH_KEY }}'
    directory: Casks

kos:
  - repositories: [escapetech/cli]
    tags:
      - '{{.Version}}'
      - latest
    bare: true
    preserve_import_paths: false
    platforms:
      - linux/amd64
      - linux/arm64
    build: docker
